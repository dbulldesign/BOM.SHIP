name: Build & Release

# Publish a new version by pushing a tag like v1.2.0:
#   1) bump APP_VERSION in src/js/app.js to match (e.g. "1.2.0")
#   2) node build.js  (and commit, so dist/ stays in sync)
#   3) git tag v1.2.0 && git push origin v1.2.0
# This workflow then builds the offline file and attaches it to a GitHub
# Release. The in-app "Check for updates" reads that release automatically.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build offline HTML
        run: node build.js

      - name: Package standalone bundle (HTML + launchers)
        run: |
          cd dist
          zip -r "lighting-bom-estimator-bundle.zip" \
            "lighting-bom-estimator.html" \
            "Lighting BOM Estimator (Windows).cmd" \
            "Lighting BOM Estimator (Mac).command"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lighting-bom-estimator.html
            dist/lighting-bom-estimator-bundle.zip
